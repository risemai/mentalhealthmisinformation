[theme]
base              = "light"
backgroundColor   = "#F8F9FA"
secondaryBackgroundColor = "#F0F2F5"
textColor         = "#212529"
primaryColor      = "#10B981"
font              = "sans serif"

[server]
headless             = true
enableCORS           = false
enableXsrfProtection = false
fileWatcherType      = "none"

[browser]
gatherUsageStats = false
